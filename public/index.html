<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simple Chat</title>
        <link rel="stylesheet" href="/style.css">
        <!-- npm i socket.io-client -->
        <script src="/socket.io/socket.io.js"></script>
        <script src="/script.js" defer></script>
    </head>
    <body>
        <main class="page">
            <section class="card profile-card" id="profileSection">
                <h1>Simple Chat</h1>
                <p class="subtitle">קודם שומרים שם וצבע, ואז עוברים לצ׳אט.</p>
                <form id="profileForm" action="#">
                    <label class="field">
                        <span>Username</span>
                        <input id="username" placeholder="הכניסי שם משתמש" autocomplete="off" />
                    </label>
                    <label class="field color-field" for="color">
                        <span>Color</span>
                        <input id="color" type="color" value="#7c3aed" />
                    </label>
                    <button type="submit">שמירה וכניסה לצ׳אט</button>
                </form>
                <p id="profileStatus" class="profile-status">אם לא תזיני שם, יישלח `unknown`.</p>
            </section>

            <section class="card chat-card hidden" id="chatSection">
                <div class="chat-header">
                    <div>
                        <h2>צ׳אט הכיתה</h2>
                        <p id="activeClientsText">יש 0 לקוחות פעילים כרגע</p>
                    </div>
                    <div class="chat-actions">
                        <p id="currentUserText" class="current-user"></p>
                        <button id="disconnectBtn" type="button">התנתקות</button>
                    </div>
                </div>

                <ul id="messages"></ul>

                <form id="form" action="#">
                    <input
                        id="input"
                        autocomplete="off"
                        placeholder="כתבי הודעה..." />
                    <button>שליחה</button>
                </form>
            </section>
        </main>
    </body>
</html>
